# Render Blueprint: https://render.com/docs/infrastructure-as-code
# New > Blueprint > connect repo > Apply. DATABASE_URL is injected from Postgres (private network).

databases:
  - name: vajranetra-db
    region: oregon
    plan: free

services:
  - type: web
    name: vajranetra
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vajranetra-db
          property: connectionString
